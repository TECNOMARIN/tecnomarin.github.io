<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETCELL - Gestión</title>
    <!-- Tailwind, ChartJS, Bootstrap, FontAwesome (Igual que index) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { background-color: #0c0c0e; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { width: 80px; height: 100vh; background: #141417; position: fixed; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #2d2d30; z-index: 100; }
        .main-content { margin-left: 80px; padding: 20px; }
        .menu-btn { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #666; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover, .menu-btn.active { background: #DAA520; color: black; }
        .kpi-card { background: #1c1c1f; padding: 15px; border-radius: 15px; border: 1px solid #2d2d30; }
        .table-dark { background-color: #1c1c1f !important; --bs-table-bg: #1c1c1f; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="https://raw.githubusercontent.com/TECNOMARIN/TUCEL/main/Copilot_20250728_133809.png" class="w-10 mb-6">
        <div class="menu-btn active" onclick="showView('dashboard')" title="Tablero"><i class="fa-solid fa-chart-line"></i></div>
        <div class="menu-btn" onclick="showView('cartera')" title="Cartera"><i class="fa-solid fa-users-viewfinder"></i></div>
        <div class="menu-btn" onclick="goToStore()" title="Volver a Tienda"><i class="fa-solid fa-store"></i></div>
    </div>

    <div class="main-content">
        <!-- VISTA DASHBOARD -->
        <div id="view-dashboard">
            <h2 class="text-xl font-black text-[#DAA520] mb-4">DASHBOARD BI</h2>
            <div class="grid grid-cols-4 gap-4 mb-4">
                <div class="kpi-card"><div class="text-xs text-gray-400">Ventas Mes</div><div class="text-2xl font-bold" id="kpi-ventas">$0</div></div>
                <div class="kpi-card"><div class="text-xs text-gray-400">Recaudo</div><div class="text-2xl font-bold text-green-500" id="kpi-recaudo">$0</div></div>
                <div class="kpi-card"><div class="text-xs text-gray-400">Cartera Total</div><div class="text-2xl font-bold text-yellow-500" id="kpi-cartera">$0</div></div>
                <div class="kpi-card"><div class="text-xs text-gray-400">Gastos</div><div class="text-2xl font-bold text-red-500" id="kpi-gastos">$0</div></div>
            </div>
            <div class="h-64 bg-[#1c1c1f] rounded-xl p-3"><canvas id="mainChart"></canvas></div>
        </div>

        <!-- VISTA CARTERA -->
        <div id="view-cartera" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-[#DAA520]">GESTIÓN DE CARTERA</h2>
                <input type="text" id="search-client" class="bg-black border border-[#333] text-white p-2 rounded" placeholder="Buscar..." oninput="filterClients()">
            </div>
            <div class="table-responsive">
                <table class="table table-dark table-hover text-xs">
                    <thead><tr><th>Cliente</th><th>Estado</th><th>Mora</th><th>Acción</th></tr></thead>
                    <tbody id="clients-table-body"><tr><td colspan="4" class="text-center">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL DETALLE CLIENTE (Reutilizado Simplificado) -->
    <div class="modal fade" id="clientModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-[#1c1c1f] text-white">
                <div class="modal-header border-[#333]"><h5 class="modal-title">Gestión Cliente</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="modal-body-content"></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFWxozORzjejvfgPS4s9g8RIP_BzVCNmpsmwdMigU6ZiHclkF_x0qnew0vv1bY-gdC/exec';
        let allClients = [];

        function showView(viewId) {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-cartera').classList.add('hidden');
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function goToStore() {
            google.script.run.withSuccessHandler(url => window.top.location.href = url).getAppUrl();
        }

        async function loadData() {
            const res = await fetch(GAS_URL + '?action=checkStatus&user=Admin'); // Asume Admin por ahora
            const data = await res.json();
            allClients = data.list;
            renderClients(allClients);
            calcKPIs(allClients);
        }

        function renderClients(list) {
            const tbody = document.getElementById('clients-table-body');
            tbody.innerHTML = list.map(c => `
                <tr>
                    <td>${c['Nombre del Cliente']}<br><small class="text-gray-500">${c.id}</small></td>
                    <td>${c.Estado}</td>
                    <td>${c['proximo pago']}</td>
                    <td><button class="btn btn-sm btn-warning" onclick='openClient(${JSON.stringify(c)})'>Ver</button></td>
                </tr>
            `).join('');
        }
        
        function filterClients() {
            const term = document.getElementById('search-client').value.toLowerCase();
            const filtered = allClients.filter(c => c['Nombre del Cliente'].toLowerCase().includes(term));
            renderClients(filtered);
        }

        function openClient(c) {
             // Aquí iría la lógica detallada del modal (Pagos, etc.)
             // Por brevedad en esta respuesta, solo muestro datos básicos, pero aquí pegarías la lógica del 'showClientDetail' anterior
             const body = document.getElementById('modal-body-content');
             body.innerHTML = `<h3 class="font-bold text-xl mb-2">${c['Nombre del Cliente']}</h3>
                               <p>Cuota: $${c['valor cuota']}</p>
                               <div class="d-grid gap-2 mt-3">
                                 <button class="btn btn-success">Registrar Pago</button>
                                 <button class="btn btn-outline-light">Ver Historial</button>
                               </div>`;
             new bootstrap.Modal(document.getElementById('clientModal')).show();
        }

        function calcKPIs(list) {
            // Lógica simple de KPIs para demo
            document.getElementById('kpi-ventas').textContent = list.length;
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
