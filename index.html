<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETCELL - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-primary: #0c0c0e; --bg-secondary: #141417; --accent-color: #DAA520; --text-primary: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); }
        .brand-header { background-color: var(--bg-secondary); border-bottom: 2px solid var(--accent-color); padding: 1rem; text-align: center; border-radius: 0 0 2rem 2rem; margin-bottom: 2rem; }
        .brand-logo { max-height: 80px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(218,165,32,0.6)); }
        .card-custom { background-color: #1c1c1f; border: 1px solid #2d2d30; border-radius: 1.5rem; overflow: hidden; transition: transform 0.2s; }
        .card-custom:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .form-control, .form-select { background-color: #000 !important; color: white !important; border: 1px solid #333 !important; }
        .form-control:focus { border-color: var(--accent-color) !important; box-shadow: none !important; }
        .btn-ia-action { background: linear-gradient(45deg, #DAA520, #FFD700); color: black; font-weight: 900; width: 100%; border: none; padding: 10px; border-radius: 10px; }
        .ocr-zone { border: 2px dashed var(--accent-color); border-radius: 1rem; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; background: rgba(218,165,32,0.05); }
        .ocr-zone.success { border-color: #10b981; background: rgba(16,185,129,0.1); }
        .ocr-preview-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="brand-header max-w-7xl mx-auto">
        <img src="https://raw.githubusercontent.com/TECNOMARIN/TUCEL/main/Copilot_20250728_133809.png" alt="Logo" class="brand-logo block">
        <span class="block text-[10px] text-[var(--accent-color)] font-black tracking-[5px] mt-1">COLOMBIA</span>
    </header>

    <div class="max-w-7xl mx-auto px-4 pb-20">
        <!-- BARRA DE ACCIÓN -->
        <div class="flex justify-between items-center gap-3 mb-6 sticky top-0 z-40 py-3 bg-[var(--bg-primary)]/95 backdrop-blur border-b border-[#333]">
            <button onclick="goToAdmin()" class="text-[var(--accent-color)] font-black text-xs uppercase border border-[var(--accent-color)] px-4 py-2 rounded-lg hover:bg-[var(--accent-color)] hover:text-black transition">
                <i class="fa-solid fa-user-lock mr-1"></i> Soy Aliado
            </button>
            <input type="text" id="search-input" placeholder="🔍 Buscar equipo..." class="flex-grow bg-[#111] border border-[#333] text-white text-xs p-2.5 rounded-lg focus:border-[var(--accent-color)]" oninput="renderCatalog()">
        </div>

        <!-- CATÁLOGO -->
        <div id="phones-section" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-10 text-zinc-500"><i class="fa-solid fa-spinner fa-spin"></i> Cargando inventario...</div>
        </div>
    </div>

    <!-- MODAL CALCULADORA MANUAL -->
    <div class="modal fade" id="manualCalcModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content bg-[#1c1c1f] text-white border-[#333]">
                <div class="modal-body p-4 text-center">
                    <h6 class="font-black text-[var(--accent-color)] uppercase mb-3">Calculadora Libre</h6>
                    <input type="number" id="calc-cost" placeholder="Costo Equipo" class="form-control mb-2 text-center">
                    <input type="number" id="calc-ini" placeholder="Inicial Cliente" class="form-control mb-3 text-center">
                    <button onclick="openFormManual()" class="btn btn-warning w-full font-black text-xs">SIMULAR CRÉDITO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO DE SOLICITUD (COMPLETO) -->
    <div class="modal fade" id="creditApplicationModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content bg-[#1c1c1f] text-white border-[#333]">
                <div class="modal-header border-[#333] py-2">
                    <h5 class="modal-title font-black uppercase text-xs">📝 Solicitud de Crédito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- OCR -->
                    <div class="grid grid-cols-3 gap-2 mb-3">
                        <div class="ocr-zone" id="zone-front" onclick="st('input-front').click()">
                            <div class="relative z-10 text-center"><i class="fa-regular fa-id-card text-xl"></i><br><span class="text-[8px] font-bold">FRENTE</span></div>
                            <input type="file" id="input-front" class="hidden" accept="image/*" onchange="previewFile(this, 'zone-front')">
                        </div>
                        <div class="ocr-zone" id="zone-back" onclick="st('input-back').click()">
                            <div class="relative z-10 text-center"><i class="fa-solid fa-id-card text-xl"></i><br><span class="text-[8px] font-bold">REVERSO</span></div>
                            <input type="file" id="input-back" class="hidden" accept="image/*" onchange="previewFile(this, 'zone-back')">
                        </div>
                        <div class="ocr-zone" id="zone-selfie" onclick="st('input-selfie').click()">
                            <div class="relative z-10 text-center"><i class="fa-solid fa-camera text-xl"></i><br><span class="text-[8px] font-bold">SELFIE</span></div>
                            <input type="file" id="input-selfie" class="hidden" accept="image/*" onchange="previewFile(this, 'zone-selfie')">
                        </div>
                    </div>
                    
                    <form id="credit-form" class="text-xs">
                        <input type="hidden" id="formProductName"><input type="hidden" id="formInitialValue"><input type="hidden" id="formInstallmentValue"><input type="hidden" id="formTotalInstallments">
                        <input type="hidden" id="deviceCost"><input type="hidden" id="licenseCost" value="70000">

                        <div class="text-[10px] text-[var(--accent-color)] font-bold uppercase border-b border-[#333] mb-2 mt-2">1. Cliente</div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <input type="text" id="idNumber" placeholder="Cédula" class="form-control" required>
                            <input type="text" id="fullName" placeholder="Nombre Completo" class="form-control" required>
                            <input type="date" id="birthDate" class="form-control" title="Nacimiento">
                            <input type="date" id="expeditionDate" class="form-control" title="Expedición">
                            <input type="text" id="birthCity" placeholder="Ciudad Nacimiento" class="form-control">
                            <input type="tel" id="phone" placeholder="Celular" class="form-control" required>
                            <input type="text" id="address" placeholder="Dirección" class="form-control" required>
                            <input type="email" id="email" placeholder="Email" class="form-control">
                        </div>

                        <div class="text-[10px] text-[var(--accent-color)] font-bold uppercase border-b border-[#333] mb-2 mt-2">2. Crédito</div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <select id="tienda" class="form-select" required><option value="">Sel. Tienda...</option></select>
                            <input type="date" id="startDate" class="form-control" required>
                            <input type="text" id="deviceId" placeholder="IMEI / ID" class="form-control col-span-2">
                        </div>
                        <div class="mb-2">
                            <label class="text-[9px] text-gray-500 uppercase font-bold">Plan de Pagos</label>
                            <select id="paymentFrequency" class="form-select" onchange="recalc()">
                                <option value="Semanal-42">Semanal (42 Cuotas)</option>
                                <option value="Quincenal-16">Quincenal (16 Cuotas)</option>
                                <option value="Mensual-8">Mensual (8 Cuotas)</option>
                            </select>
                        </div>
                        <div class="bg-black border border-dashed border-[var(--accent-color)] p-3 rounded-lg text-center mb-3">
                            <span class="block text-[9px] text-gray-400 uppercase">Valor Cuota Estimada</span>
                            <span id="installment-display" class="text-2xl font-black text-white">$0</span>
                        </div>

                        <div class="text-[10px] text-[var(--accent-color)] font-bold uppercase border-b border-[#333] mb-2 mt-2">3. Referencias</div>
                        <div class="grid grid-cols-3 gap-1 mb-2">
                            <input type="text" id="ref1Name" placeholder="Ref 1 Nombre" class="form-control col-span-2">
                            <input type="tel" id="ref1Phone" placeholder="Tel" class="form-control">
                            <input type="text" id="ref2Name" placeholder="Ref 2 Nombre" class="form-control col-span-2">
                            <input type="tel" id="ref2Phone" placeholder="Tel" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success w-full font-black text-xs py-3 uppercase mt-2">ENVIAR SOLICITUD</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast-notification" class="fixed top-5 right-5 hidden p-3 rounded-lg shadow-xl z-[9000] text-xs font-bold text-white bg-zinc-800 border border-zinc-700"></div>

    <script>
        const st = (id) => document.getElementById(id);
        const AppConfig = { 
            gasUrl: 'https://script.google.com/macros/s/AKfycbyFWxozORzjejvfgPS4s9g8RIP_BzVCNmpsmwdMigU6ZiHclkF_x0qnew0vv1bY-gdC/exec',
            products: []
        };
        let currentBalance = 0;

        function showToast(m) { const t=st('toast-notification'); t.textContent=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); }

        function goToAdmin() {
            // REDIRECCIÓN A LA VISTA DE GESTIÓN
            google.script.run.withSuccessHandler(url => {
                window.top.location.href = url + "?v=gestion";
            }).getAppUrl();
        }

        async function loadCatalog() {
            try {
                const res = await fetch(AppConfig.gasUrl + '?action=getInventory');
                const data = await res.json();
                AppConfig.products = data.products || [];
                renderCatalog();
                // Cargar tiendas en el select oculto
                const resStores = await fetch(AppConfig.gasUrl + '?action=getStores');
                const stores = await resStores.json();
                if(st('tienda') && Array.isArray(stores)) {
                    st('tienda').innerHTML = stores.map(s => `<option value="${s}">${s}</option>`).join('');
                }
            } catch (e) {
                console.error(e);
                st('phones-section').innerHTML = '<p class="col-span-full text-center py-10 text-red-500">Error cargando catálogo.</p>';
            }
        }

        function renderCatalog() {
            const term = st('search-input').value.toLowerCase();
            const list = AppConfig.products.filter(p => p.name.toLowerCase().includes(term));
            const container = st('phones-section');
            
            let html = `<div class="card-custom border-dashed border-2 border-[var(--accent-color)] bg-transparent cursor-pointer p-3 flex flex-col items-center justify-center min-h-[200px]" onclick="new bootstrap.Modal(st('manualCalcModal')).show()">
                            <div class="text-4xl text-[var(--accent-color)] mb-2"><i class="fa-solid fa-calculator"></i></div>
                            <h2 class="text-[10px] font-black uppercase text-zinc-500">Calculadora Libre</h2>
                        </div>`;
            
            html += list.map((p, i) => `
                <div class="card-custom cursor-pointer group" onclick="openProduct(${i})">
                    <div class="h-40 bg-white p-3 flex items-center justify-center">
                        <img src="${p.img}" class="max-h-full object-contain" onerror="this.src='https://placehold.co/400?text=No+Img'">
                    </div>
                    <div class="p-3 text-center">
                        <h2 class="text-[10px] font-black uppercase text-white h-8 overflow-hidden">${p.name}</h2>
                        <span class="bg-[var(--accent-color)] text-black px-2 py-1 rounded font-black text-[9px]">INI: ${p.ini}</span>
                    </div>
                </div>`).join('');
            
            container.innerHTML = html;
        }

        function openProduct(idx) {
            const p = AppConfig.products[idx]; // Buscar en la lista filtrada sería mejor, pero por ahora usa índice global si no filtras
            // Mejor buscar en el array completo filtrando por nombre o ID si tuvieras. 
            // Como simplificación asumimos que 'list' en renderCatalog mantiene orden si no hay filtro.
            // Para robustez, mejor pasar el objeto:
            // Pero onclick solo pasa primitivos.
            // Usaremos el array global filtrado por nombre exacto para seguridad:
            const product = AppConfig.products.find(x => x.name === p.name) || p;
            
            setupForm(product.name, product.cost, product.ini);
        }
        
        // Sobreescribimos openProduct para usar el índice correcto del array global
        window.openProduct = function(idx) {
           // Truco: renderCatalog usa el array filtrado. Si hay filtro, el índice cambia.
           // Lo ideal es volver a buscar el producto.
           // Pero para este fix rápido, asumiremos que AppConfig.products es la fuente de verdad.
           // Y renderCatalog debería usar IDs.
           // Por ahora, recarguemos sin filtro para asegurar índices o...
           // Solución robusta:
           const name = document.querySelectorAll('#phones-section .card-custom h2')[idx+1].textContent; // +1 por la calculadora
           const p = AppConfig.products.find(x => x.name === name);
           if(p) setupForm(p.name, p.cost, p.ini);
        };
        
        // Mejor solución: Pasar los datos directo al onclick en el render
        function renderCatalog() {
            const term = st('search-input').value.toLowerCase();
            const list = AppConfig.products.filter(p => p.name.toLowerCase().includes(term));
            const container = st('phones-section');
            
            let html = `<div class="card-custom border-dashed border-2 border-[var(--accent-color)] bg-transparent cursor-pointer p-3 flex flex-col items-center justify-center min-h-[200px]" onclick="new bootstrap.Modal(st('manualCalcModal')).show()">
                            <div class="text-4xl text-[var(--accent-color)] mb-2"><i class="fa-solid fa-calculator"></i></div>
                            <h2 class="text-[10px] font-black uppercase text-zinc-500">Calculadora Libre</h2>
                        </div>`;
            
            html += list.map(p => `
                <div class="card-custom cursor-pointer" onclick="setupForm('${p.name}', '${p.cost}', '${p.ini}')">
                    <div class="h-40 bg-white p-3 flex items-center justify-center">
                        <img src="${p.img}" class="max-h-full object-contain" onerror="this.src='https://placehold.co/400?text=IMG'">
                    </div>
                    <div class="p-3 text-center">
                        <h2 class="text-[10px] font-black uppercase text-white h-8 overflow-hidden">${p.name}</h2>
                        <span class="bg-[var(--accent-color)] text-black px-2 py-1 rounded font-black text-[9px]">INI: ${p.ini}</span>
                    </div>
                </div>`).join('');
            container.innerHTML = html;
        }
        
        window.setupForm = function(name, cost, iniStr) {
            const costVal = parseInt(cost);
            const iniVal = parseInt(String(iniStr).replace(/\D/g, ''));
            
            currentBalance = ((costVal - iniVal) + 70000) * 4.78;
            
            st('formProductName').value = name;
            st('formInitialValue').value = iniStr;
            st('deviceCost').value = costVal;
            st('startDate').value = new Date().toISOString().split('T')[0];
            
            recalc();
            // Cerrar otros modales
            const mCalc = bootstrap.Modal.getInstance(st('manualCalcModal'));
            if(mCalc) mCalc.hide();
            
            new bootstrap.Modal(st('creditApplicationModal')).show();
        };

        window.openFormManual = function() {
            const c = st('calc-cost').value;
            const i = st('calc-ini').value;
            if(!c || !i) return alert("Faltan datos");
            setupForm("MANUAL", c, i);
        };

        window.recalc = function() {
            const freq = st('paymentFrequency').value;
            const total = parseInt(freq.split('-')[1]);
            const val = Math.ceil(Math.ceil(currentBalance / total) / 100) * 100;
            st('installment-display').textContent = `$${val.toLocaleString('es-CO')}`;
            st('formInstallmentValue').value = val;
            st('formTotalInstallments').value = total;
        };

        window.previewFile = function(input, zoneId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const zone = st(zoneId);
                    zone.style.backgroundImage = `url(${e.target.result})`;
                    zone.style.backgroundSize = 'cover';
                    zone.classList.add('success');
                }
                reader.readAsDataURL(input.files[0]);
            }
        };

        st('credit-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = "Procesando...";
            
            const formData = {
                action: 'saveApplication',
                idNumber: st('idNumber').value,
                fullName: st('fullName').value,
                birthDate: st('birthDate').value,
                expeditionDate: st('expeditionDate').value,
                birthDept: st('birthDept').value,
                birthCity: st('birthCity').value,
                phone: st('phone').value,
                address: st('address').value,
                email: st('email').value,
                labor: st('laborInfo').value,
                eps: st('eps').value,
                productName: st('formProductName').value,
                initialValue: st('formInitialValue').value,
                totalInstallments: st('formTotalInstallments').value,
                installmentValue: st('formInstallmentValue').value,
                deviceCost: st('deviceCost').value,
                deviceId: st('deviceId').value,
                tienda: st('tienda').value,
                ref1Name: st('ref1Name').value, ref1Phone: st('ref1Phone').value, ref1Relation: st('ref1Relation').value,
                ref2Name: st('ref2Name').value, ref2Phone: st('ref2Phone').value, ref2Relation: st('ref2Relation').value,
                paymentFrequency: st('paymentFrequency').value.split('-')[0]
            };

            const res = await fetch(AppConfig.gasUrl, { method: 'POST', body: JSON.stringify(formData) });
            const json = await res.json();
            
            if(json.success) {
                alert("✅ Solicitud enviada correctamente");
                location.reload();
            } else {
                alert("❌ Error: " + json.error);
                btn.disabled = false; btn.textContent = "Reintentar";
            }
        };

        loadCatalog();
    </script>
</body>
</html>
