<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETCELL - Editor Maestro </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #0c0c0e; --card: #1c1c1f; --accent: #DAA520; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #f8fafc; }
        .table-responsive { max-height: 70vh; overflow-y: auto; border: 1px solid #2d2d30; border-radius: 12px; }
        .table-hoy { width: 100%; border-collapse: collapse; font-size: 11px; }
        .table-hoy th { sticky; top: 0; background: #141417; color: #666; padding: 12px; text-transform: uppercase; font-weight: 800; border-bottom: 2px solid #2d2d30; z-index: 10; }
        .table-hoy td { padding: 10px; border-bottom: 1px solid #1c1c1f; white-space: nowrap; }
        .table-hoy tr:hover { background: #252529; }
        .form-control, .form-select { background-color: #000 !important; color: white !important; border: 1px solid #333 !important; font-size: 11px !important; }
        .form-control:focus, .form-select:focus { border-color: var(--accent) !important; box-shadow: none !important; }
        .modal-content { background-color: #121214; border: 1px solid #2d2d30; border-radius: 20px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="toast" class="fixed top-5 right-5 hidden bg-zinc-800 border-l-4 border-yellow-500 text-white px-5 py-3 rounded-lg shadow-2xl z-[9999] transition-opacity">
        <span id="toast-text" class="text-[11px] font-black uppercase"></span>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-[var(--accent)] uppercase tracking-tighter">Editor Maestro</h1>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Base administradores</p>
            </div>
            <div class="flex gap-2">
                <button onclick="window.location.href='gestion.html'" class="bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-lg">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Panel
                </button>
                <button onclick="loadData()" class="bg-yellow-600 hover:bg-yellow-500 text-black px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-lg">
                    <i class="fa-solid fa-sync mr-2"></i> Recargar Tabla
                </button>
            </div>
        </div>

        <div class="bg-[var(--card)] p-6 rounded-2xl border border-[#2d2d30] shadow-2xl">
            <div class="mb-4">
                <input type="text" id="search-box" placeholder="Filtrar por nombre o cédula..." class="form-control w-full md:w-80 p-3 rounded-xl" oninput="renderTable()">
            </div>

            <div class="table-responsive no-scrollbar">
                <table class="table-hoy">
                    <thead>
                        <tr id="table-headers">
                            <!-- Headers dinámicos -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="10" class="text-center py-20 text-zinc-600 font-bold uppercase">Iniciando conexión con el servidor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN EXTENDIDO -->
    <div class="modal fade" id="editRowModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content text-white">
                <div class="modal-header border-zinc-800 bg-zinc-900 p-4">
                    <h5 class="modal-title font-black text-sm uppercase text-[var(--accent)]">Modificar Registro Maestro</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-6">
                    <form id="edit-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Campos inyectados dinámicamente -->
                    </form>
                </div>
                <div class="modal-footer border-zinc-800 p-4 justify-center">
                    <button id="save-btn" onclick="saveRecord()" class="btn btn-warning w-full font-black uppercase text-xs py-3 shadow-lg">
                        ACTUALIZAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFWxozORzjejvfgPS4s9g8RIP_BzVCNmpsmwdMigU6ZiHclkF_x0qnew0vv1bY-gdC/exec';
        let currentUser = null;
        let tableData = [];
        let editingRowId = null;
        let storeList = []; // Cache de tiendas
        const statusOptions = ["ACTIVO", "INACTIVO", "PAZ Y SALVO", "PENDIENTE DE ESTUDIO", "RECHAZADO", "ANULADO", "EN ESTUDIO"];

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3500);
        }

        async function checkAuth() {
            const stored = sessionStorage.getItem('jetcellUser');
            currentUser = stored ? JSON.parse(stored) : { user: 'h.ricardo.marin@gmail.com', name: 'H. Ricardo Marín', role: 'Admin' };
            
            // Cargar tiendas en segundo plano para los selectores
            fetch(`${GAS_URL}?action=getStores`)
                .then(r => r.json())
                .then(data => storeList = Array.isArray(data) ? data : []);

            loadData();
        }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="10" class="text-center py-20"><i class="fa-solid fa-spinner fa-spin text-yellow-500 text-3xl"></i></td></tr>';
            
            try {
                const res = await fetch(`${GAS_URL}?action=checkStatus&user=${encodeURIComponent(currentUser.user)}`);
                const data = await res.json();
                tableData = data.list || [];
                renderTable();
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-red-500 py-10 font-bold uppercase">Error de red</td></tr>';
            }
        }

        function renderTable() {
            if (tableData.length === 0) return;
            
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = tableData.filter(r => 
                String(r['Nombre del Cliente']).toLowerCase().includes(term) || 
                String(r.id).includes(term)
            );

            // Headers
            const keys = Object.keys(tableData[0]);
            document.getElementById('table-headers').innerHTML = `<th style="position: sticky; left: 0; background: #141417; z-index: 20;">Acción</th>` + keys.map(k => `<th>${k}</th>`).join('');

            // Body
            document.getElementById('table-body').innerHTML = filtered.map(r => `
                <tr>
                    <td style="position: sticky; left: 0; background: #0c0c0e; z-index: 5;"><button onclick="openEdit('${r.id}')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded font-black uppercase text-[9px]">Editar</button></td>
                    ${keys.map(k => `<td>${r[k] === null || r[k] === undefined ? '-' : r[k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        function openEdit(id) {
            const record = tableData.find(r => String(r.id) === String(id));
            if (!record) return;
            editingRowId = id;
            
            const form = document.getElementById('edit-form');
            form.innerHTML = Object.keys(record).map(key => {
                const isId = key === 'id';
                const val = record[key];
                const label = key.toLowerCase();

                // Lógica de Select para TIENDA
                if (label === 'tienda') {
                    return `
                    <div>
                        <label class="text-[9px] text-zinc-500 font-black uppercase mb-1 block">${key}</label>
                        <select data-field="${key}" class="form-select">
                            <option value="">Seleccionar Tienda...</option>
                            ${storeList.map(s => `<option value="${s}" ${String(val) === String(s) ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>`;
                }

                // Lógica de Select para ESTADO
                if (label === 'estado') {
                    return `
                    <div>
                        <label class="text-[9px] text-zinc-500 font-black uppercase mb-1 block">${key}</label>
                        <select data-field="${key}" class="form-select">
                            ${statusOptions.map(opt => `<option value="${opt}" ${String(val).toUpperCase() === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </div>`;
                }

                // Input Normal
                return `
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase mb-1 block">${key}</label>
                    <input type="text" data-field="${key}" class="form-control" value="${val || ''}" ${isId ? 'disabled' : ''}>
                </div>`;
            }).join('');

            new bootstrap.Modal(document.getElementById('editRowModal')).show();
        }

        async function saveRecord() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> PROCESANDO...';

            const inputs = document.querySelectorAll('#edit-form input, #edit-form select');
            const id = editingRowId;

            try {
                // Actualizamos campo por campo para asegurar integridad con la API existente
                const promises = Array.from(inputs).filter(i => !i.disabled).map(input => {
                    const field = input.getAttribute('data-field');
                    const value = input.value;
                    return fetch(`${GAS_URL}?action=updateField`, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'updateField',
                            type: 'client',
                            id: id,
                            field: field,
                            value: value
                        })
                    });
                });

                await Promise.all(promises);
                showToast("Cambios sincronizados correctamente");
                bootstrap.Modal.getInstance(document.getElementById('editRowModal')).hide();
                loadData();
            } catch (e) {
                showToast("Error al guardar cambios");
            }

            btn.disabled = false;
            btn.innerHTML = 'ACTUALIZAR';
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
